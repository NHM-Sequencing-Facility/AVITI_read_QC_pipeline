# ============================================================
# MultiQC custom configuration for AVITI read QC pipeline
# ============================================================

# ---- Split FastQC (i.e. flaco) into separately-labelled pre/post-QC runs ----
# pre_qc_dir and post_qc_dir zips share identical sample names
# (both produce e.g. "{sample}_R1_fastqc.zip"), so without this split
# MultiQC silently overwrites one stage's FastQC data with the other's
# in the General Stats table and plots.
module_order:
  - fastqc:
      name: "FastQC (pre-QC, raw reads)"
      anchor: "fastqc_raw"
      path_filters:
        - "*/01_pre_qc/*"
  - fastp
  - fastqc:
      name: "FastQC (post-QC, after fastp)"
      anchor: "fastqc_trimmed"
      path_filters:
        - "*/03_post_qc/*"
  - seqkit

# ---- Drop fastp's plot sections that duplicate FastQC's ----
# Sequence quality, GC content, N content, and duplication levels are
# kept from FastQC instead. Filtered Reads and Insert Size have no
# FastQC equivalent and stay put.
remove_sections:
  - fastp-seq-quality
  - fastp-seq-content-gc
  - fastp-seq-content-n
  - fastp-duprates

# ---- General Statistics table ----
table_columns_visible:
  fastqc_pre_qc_raw_reads:
    median_sequence_length: false
    percent_fails: false
  fastp:
    filtering_result_passed_filter_reads: false
    before_filtering_read1_mean_length: false
    before_filtering_read2_mean_length: false
  fastqc_post_qc_after_fastp:
    median_sequence_length: false
    percent_fails: false
    total_sequences: false
  seqkit_seqkit:
    N50: false

# Pipeline/report-level info — shown once at the very top of the report
report_comment: |
  This MultiQC report was generated by the [AVITI read QC pipeline](https://github.com/NHM-Sequencing-Facility/AVITI_read_QC_pipeline) developed at NHMUK. The report outlines pre-quality control (QC), QC, and post-QC statistics per sample, and read.

# Explainer text — shown directly above the General Statistics table specifically
section_comments:
  general_stats: |
    This table shows both sample- and individual read-level (R1 and R2) statistics to provide an overview of read QC at different stages of the pipeline.
    
    Columns proceed successively from left to right, with pre-QC (FastQC) data columns on the left, and post-QC (FastQC & Seqkit Stats) on the right.
    
    Hover over the column headings for more information, and 'Configure Columns' for further information and reformatting of the table.
